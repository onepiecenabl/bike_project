<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>자전거 길 안내기</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <div id="title-row">
                <span id="title-icon">🚲</span>
                <h1>Bike Path Finder</h1>
            </div>
            <div id="tabs">
                <button class="tab active" data-mode="roads">자전거도로</button>
                <button class="tab" data-mode="route">길찾기</button>
            </div>

            <!-- Roads Panel -->
            <div id="roads-panel">
                <div id="roads-controls">
                    <div class="control-item">
                        <label>탐색 반경</label>
                        <div class="slider-row">
                            <input type="range" id="radius" min="1" max="25" value="1">
                            <span id="radius-value">1 km</span>
                        </div>
                    </div>
                    <button id="find-btn">🔍 발견하기</button>
                </div>
                <div id="legend"></div>
            </div>

            <!-- Route Panel -->
            <div id="route-panel" class="hidden">
                <div class="waypoint-group">
                    <div class="waypoint-row">
                        <span class="wp-dot wp-start"></span>
                        <div class="search-wrap">
                            <input id="from-input" type="text" placeholder="출발지 입력 또는 지도 클릭" autocomplete="off">
                            <div id="from-results" class="search-results hidden"></div>
                        </div>
                        <button class="icon-btn" onclick="useMyLocation('from')" title="현재 위치">📍</button>
                    </div>
                    <div class="wp-connector"><div class="connector-line"></div></div>
                    <div class="waypoint-row">
                        <span class="wp-dot wp-end"></span>
                        <div class="search-wrap">
                            <input id="to-input" type="text" placeholder="목적지 입력 또는 지도 클릭" autocomplete="off">
                            <div id="to-results" class="search-results hidden"></div>
                        </div>
                        <button class="icon-btn" onclick="useMyLocation('to')" title="현재 위치">📍</button>
                    </div>
                </div>
                <button id="route-btn" class="hidden">🌐 경로 찾기</button>
                <button id="clear-btn" class="hidden" style="width:100%; background:none; border:none; color:#78909c; font-size:0.8rem; margin-bottom:8px; cursor:pointer;">✕ 지우기</button>
                <div id="route-stats" class="hidden">
                    <div class="stat-item"><span class="stat-icon">📏</span><span id="stat-dist">-</span></div>
                    <div class="stat-item"><span class="stat-icon">⏱</span><span id="stat-time">-</span></div>
                </div>
            </div>

            <button id="dir-toggle-btn" class="hidden" onclick="toggleDirections()">길안내 ▼</button>
            <div id="status"></div>
        </div>

        <div id="map"></div>

        <div id="map-hint" class="hidden">
            <span id="map-hint-text"></span>
            <button onclick="cancelMapClick()">취소</button>
        </div>

        <div id="directions-panel" class="hidden">
            <div id="directions-header">
                <span>길안내</span>
                <button onclick="toggleDirections()">▲</button>
            </div>
            <div id="directions-list"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
